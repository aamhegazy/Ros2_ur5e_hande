moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - scaled_joint_trajectory_controller  # <--- CHANGED FROM UR_controller
    - gripper_controller

  scaled_joint_trajectory_controller:     # <--- CHANGED FROM UR_controller
    # Match the active controller type
    type: FollowJointTrajectory
    # CRITICAL: This tells MoveIt the specific topic to publish to
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

  gripper_controller:
    # MoveIt uses 'GripperCommand' to talk to a 'GripperActionController'
    type: GripperCommand
    # Standard namespace for gripper controllers
    action_ns: gripper_cmd
    joints:
      - robotiq_hande_left_finger_joint